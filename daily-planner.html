<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;0,700;1,400&family=Poppins:wght@300;400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Daily Planner – Aditi Chandrashekar</title>
    <meta name="author" content="Aditi Chandrashekar">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@1/css/pico.min.css">
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" href="/images/icon_dark.png" sizes="32x32" type="image/png">
    <style>
        #root {
            padding: 2rem 1rem 4rem;
        }
        @media (max-width: 700px) {
            .planner-grid {
                grid-template-columns: 1fr !important;
            }
        }
    </style>
</head>
<body>
    <canvas id="particle-canvas"></canvas>
    <header>
        <h1 id="header-clock"></h1>
        <a class="bird-link" href="index.html" title="Home" aria-label="Home"></a>
    </header>
    <script>
        (function () {
            window.stressMode = false;
            function tick() {
                const opts = window.stressMode
                    ? { hour: '2-digit', minute: '2-digit', second: '2-digit' }
                    : { hour: '2-digit', minute: '2-digit' };
                document.getElementById('header-clock').textContent =
                    new Date().toLocaleTimeString([], opts);
            }
            tick();
            setInterval(tick, 1000);
        })();
    </script>

    <div id="root"></div>

    <!-- React + ReactDOM UMD -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel standalone for JSX transform -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script>
        (async () => {
            const src = await fetch('./daily-planner.jsx', { cache: 'no-store' }).then(r => r.text());
            const patched = src
                // Replace React import with globals
                .replace(/^import\s+\{[^}]+\}\s+from\s+["']react["'];?\s*/m,
                    'const { useState, useCallback, useEffect, useRef } = React;\n')
                // Strip export default
                .replace(/^export\s+default\s+/m, '')
                // Dark theme: semi-transparent red cards, white text
                .replace(
                    /const P = \{[\s\S]*?\};/,
                    `const P = {
  bg: "transparent", card: "rgba(148, 22, 4, 0.38)", accent: "#D4764E",
  accentLight: "rgba(212,118,78,0.3)", accentDark: "#E8956D",
  text: "#fff8f4", textMuted: "rgba(255,248,244,0.55)", border: "rgba(255,248,244,0.18)",
  taskBg: "rgba(120, 18, 3, 0.35)", gridEmpty: "rgba(255,248,244,0.1)",
  gridFilled: "#D4764E", gridPast: "rgba(255,248,244,0.05)",
};`
                )
                // Dark priority colours
                .replace(
                    /const PRIORITY_COLORS = \{[\s\S]*?\};/,
                    `const PRIORITY_COLORS = {
  high:   { bg: "rgba(217,79,79,0.18)",   dot: "#D94F4F", label: "High" },
  medium: { bg: "rgba(230,168,48,0.18)",  dot: "#E6A830", label: "Med"  },
  low:    { bg: "rgba(0,151,167,0.18)",   dot: "#0097A7", label: "Low"  },
};`
                )
                // Past-filled grid slot colour
                .replace(/"#C4A08A"/g, '"rgba(212,118,78,0.5)"')
                // Unscheduled-tasks banner
                .replace(/"#FFF5F5"/g, '"rgba(148,22,4,0.4)"')
                .replace(/"1px solid #F0D0D0"/g, '"1px solid rgba(255,248,244,0.18)"')
                .replace(/"#C0392B"/g, '"rgba(255,248,244,0.8)"');

            const transformed = Babel.transform(patched, { presets: ['react'] }).code;
            const code = transformed + '\nReactDOM.createRoot(document.getElementById("root")).render(React.createElement(DailyPlanner));';
            // eslint-disable-next-line no-eval
            eval(code);
        })();
    </script>

    <script>
    (function () {
        var canvas = document.getElementById('particle-canvas');
        var ctx = canvas.getContext('2d');
        var W, H, particles;
        var mouse = { x: null, y: null };
        var mobile = window.innerWidth <= 768;
        var COUNT = mobile ? 35 : 100;
        var MAX_DIST = mobile ? 100 : 130;

        function resize() {
            W = canvas.width = window.innerWidth;
            H = canvas.height = window.innerHeight;
        }

        function init() {
            resize();
            particles = [];
            for (var i = 0; i < COUNT; i++) {
                particles.push({
                    x: Math.random() * W,
                    y: Math.random() * H,
                    vx: (Math.random() - 0.5) * 0.5,
                    vy: (Math.random() - 0.5) * 0.5,
                    r: mobile
                        ? Math.random() * 0.8 + 0.4
                        : Math.random() * 1.65 + 0.55
                });
            }
        }

        if (!mobile) {
            window.addEventListener('mousemove', function (e) {
                mouse.x = e.clientX;
                mouse.y = e.clientY;
            });
            window.addEventListener('mouseleave', function () {
                mouse.x = null;
                mouse.y = null;
            });
        }

        window.addEventListener('resize', function () { resize(); });

        function draw() {
            ctx.clearRect(0, 0, W, H);
            ctx.fillStyle = '#201d1b';
            ctx.fillRect(0, 0, W, H);

            for (var i = 0; i < particles.length; i++) {
                var p = particles[i];
                p.x += p.vx;
                p.y += p.vy;
                if (p.x < 0 || p.x > W) p.vx *= -1;
                if (p.y < 0 || p.y > H) p.vy *= -1;

                ctx.beginPath();
                ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(255,248,244,0.85)';
                ctx.fill();

                for (var j = i + 1; j < particles.length; j++) {
                    var q = particles[j];
                    var dx = p.x - q.x, dy = p.y - q.y;
                    var dist = Math.sqrt(dx * dx + dy * dy);
                    if (dist < MAX_DIST) {
                        ctx.beginPath();
                        ctx.moveTo(p.x, p.y);
                        ctx.lineTo(q.x, q.y);
                        ctx.strokeStyle = 'rgba(255,248,244,' + (1 - dist / MAX_DIST) * 0.35 + ')';
                        ctx.lineWidth = 0.6;
                        ctx.stroke();
                    }
                }

                if (!mobile && mouse.x !== null) {
                    var mdx = p.x - mouse.x, mdy = p.y - mouse.y;
                    var mdist = Math.sqrt(mdx * mdx + mdy * mdy);
                    if (mdist < MAX_DIST) {
                        ctx.beginPath();
                        ctx.moveTo(p.x, p.y);
                        ctx.lineTo(mouse.x, mouse.y);
                        ctx.strokeStyle = 'rgba(255,248,244,' + (1 - mdist / MAX_DIST) * 0.5 + ')';
                        ctx.lineWidth = 0.8;
                        ctx.stroke();
                    }
                }
            }
            requestAnimationFrame(draw);
        }

        init();
        draw();
    })();
    </script>
</body>
</html>
