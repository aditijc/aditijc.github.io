    <script>
    (function () {
        var canvas = document.getElementById('particle-canvas');
        var ctx = canvas.getContext('2d');
        var W, H, particles;
        var mouse = { x: null, y: null };
        var mobile = window.innerWidth <= 768;
        var COUNT = mobile ? 35 : 100;
        var MAX_DIST = mobile ? 100 : 130;

        function resize() {
            W = canvas.width = window.innerWidth;
            H = canvas.height = window.innerHeight;
        }

        function init() {
            resize();
            particles = [];
            for (var i = 0; i < COUNT; i++) {
                particles.push({
                    x: Math.random() * W,
                    y: Math.random() * H,
                    vx: (Math.random() - 0.5) * 0.5,
                    vy: (Math.random() - 0.5) * 0.5,
                    r: mobile
                        ? Math.random() * 0.8 + 0.4
                        : Math.random() * 1.65 + 0.55
                });
            }
        }

        if (!mobile) {
            window.addEventListener('mousemove', function (e) {
                mouse.x = e.clientX;
                mouse.y = e.clientY;
            });
            window.addEventListener('mouseleave', function () {
                mouse.x = null;
                mouse.y = null;
            });
        }

        window.addEventListener('resize', function () {
            resize();
        });

        function draw() {
            ctx.clearRect(0, 0, W, H);
            ctx.fillStyle = '#201d1b';
            ctx.fillRect(0, 0, W, H);

            for (var i = 0; i < particles.length; i++) {
                var p = particles[i];
                p.x += p.vx;
                p.y += p.vy;
                if (p.x < 0 || p.x > W) p.vx *= -1;
                if (p.y < 0 || p.y > H) p.vy *= -1;

                ctx.beginPath();
                ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(255,248,244,0.85)';
                ctx.fill();

                for (var j = i + 1; j < particles.length; j++) {
                    var q = particles[j];
                    var dx = p.x - q.x, dy = p.y - q.y;
                    var dist = Math.sqrt(dx * dx + dy * dy);
                    if (dist < MAX_DIST) {
                        ctx.beginPath();
                        ctx.moveTo(p.x, p.y);
                        ctx.lineTo(q.x, q.y);
                        ctx.strokeStyle = 'rgba(255,248,244,' + (1 - dist / MAX_DIST) * 0.35 + ')';
                        ctx.lineWidth = 0.6;
                        ctx.stroke();
                    }
                }

                if (!mobile && mouse.x !== null) {
                    var mdx = p.x - mouse.x, mdy = p.y - mouse.y;
                    var mdist = Math.sqrt(mdx * mdx + mdy * mdy);
                    if (mdist < MAX_DIST) {
                        ctx.beginPath();
                        ctx.moveTo(p.x, p.y);
                        ctx.lineTo(mouse.x, mouse.y);
                        ctx.strokeStyle = 'rgba(255,248,244,' + (1 - mdist / MAX_DIST) * 0.5 + ')';
                        ctx.lineWidth = 0.8;
                        ctx.stroke();
                    }
                }
            }
            requestAnimationFrame(draw);
        }

        init();
        draw();
    })();
    </script>
</body>
